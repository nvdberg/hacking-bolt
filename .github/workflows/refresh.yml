name: Hacking-Bolt refresh

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min (public repo = free unlimited Actions minutes)
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

permissions:
  contents: read

concurrency:
  group: hacking-bolt
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # cache the chromium download so runs stay ~1 minute
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-v1

      # persist the logged-in session + roster + last shifts between runs (no re-login, fast diff)
      - name: Restore state
        uses: actions/cache@v4
        with:
          path: |
            state.json
            roster.json
            site/shifts.json
          key: hb-state-${{ github.run_id }}
          restore-keys: hb-state-

      - name: Install
        working-directory: stage2
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Scrape + notify
        working-directory: stage2
        env:
          LB_USER: ${{ secrets.LB_USER }}
          LB_PASS: ${{ secrets.LB_PASS }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          STATE_FILE: ${{ github.workspace }}/state.json
          ROSTER_FILE: ${{ github.workspace }}/roster.json
          OUT_DIR: ${{ github.workspace }}/site
        run: node run.mjs
